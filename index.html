<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flipp</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Flipp">
<meta name="application-name" content="Flipp">
<link rel="icon" href="https://res.cloudinary.com/do5tz8aun/image/upload/v1773554086/flipp_logo.png">
<link rel="apple-touch-icon" href="https://res.cloudinary.com/do5tz8aun/image/upload/v1773554086/flipp_logo.png">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4056187987785109" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #f5f5f3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.app {
  max-width: 480px; margin: 0 auto; background: #fff;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  position: relative; overflow: hidden;
}

/* TAB BAR - safe-area는 padding-bottom으로 처리 */
.tab-bar {
  display: flex; background: #fff; flex-shrink: 0;
  border-top: 0.5px solid #e8e8e8;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.tab-btn { flex: 1; padding: 14px 0 12px; font-size: 13px; font-weight: 500; background: none; border: none; cursor: pointer; color: #aaa; transition: color 0.15s; }
.tab-btn.active { color: #111; }
.tab-center { flex: 0 0 56px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; border-left: 0.5px solid rgba(0,0,0,0.1); border-right: 0.5px solid rgba(0,0,0,0.1); font-size: 24px; font-weight: 300; color: #888; transition: color 0.15s; padding: 0; line-height: 1; }
.tab-center:hover { color: #111; }

#study-tab, #manage-tab { display: flex; flex-direction: column; flex: 1; min-height: 0; padding: 1.25rem 1.25rem 0; overflow: hidden; }
.hidden { display: none !important; }

/* TAG FILTER - 학습/관리탭: 좌우 스크롤 */
.tag-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 1rem; scrollbar-width: none; flex-shrink: 0; flex-wrap: nowrap; }
.tag-scroll::-webkit-scrollbar { display: none; }
.tag-pill { display: inline-flex; align-items: center; font-size: 12px; padding: 5px 13px; border-radius: 99px; border: 0.5px solid #ddd; background: #fff; color: #888; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
.tag-pill.active { background: #111; color: #fff; border-color: #111; }

.progress-row { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 0.6rem; flex-shrink: 0; }
.progress-bar-wrap { flex: 1; height: 3px; background: #eee; border-radius: 99px; }
.progress-bar-fill { height: 100%; background: #111; border-radius: 99px; transition: width 0.3s; }
.progress-count { font-size: 12px; color: #999; white-space: nowrap; }

.card-area { position: relative; height: 340px; flex-shrink: 0; margin-bottom: 1rem; touch-action: pan-y; cursor: pointer; user-select: none; overflow: hidden; }
.flashcard { position: absolute; inset: 0; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 20px; padding: 2rem 1.75rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
.flashcard.slide-in-left { animation: slideInLeft 0.22s cubic-bezier(.4,0,.2,1) both; }
.flashcard.slide-in-right { animation: slideInRight 0.22s cubic-bezier(.4,0,.2,1) both; }
@keyframes slideInLeft { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideInRight { from { transform: translateX(-110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.flashcard.back { background: #111; border-color: #111; }
.flashcard.back .card-content { color: #fff; }
.flashcard.back .card-side-label { color: rgba(255,255,255,0.35); }
.card-side-label { position: absolute; top: 1.1rem; right: 1.25rem; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; color: #bbb; text-transform: uppercase; }
.card-tag-label { position: absolute; top: 1.1rem; left: 1.25rem; font-size: 11px; font-weight: 500; color: #bbb; max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.flashcard.back .card-tag-label { color: rgba(255,255,255,0.35); }
.card-content { font-size: 18px; font-weight: 500; line-height: 1.7; color: #111; white-space: pre-wrap; word-break: break-word; }

.action-row { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-bottom: 0.6rem; }
.memorize-btn { flex: 1; padding: 12px 0; font-size: 14px; font-weight: 500; border-radius: 14px; cursor: pointer; border: 0.5px solid #e0e0e0; background: #fff; color: #999; transition: all 0.2s; }
.memorize-btn.active { background: #111; color: #fff; border-color: #111; }
.shuffle-btn { padding: 12px 16px; font-size: 13px; font-weight: 500; border-radius: 14px; cursor: pointer; background: transparent; border: 0.5px solid #e0e0e0; color: #bbb; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.shuffle-btn:hover { color: #111; border-color: #999; }
.shuffle-btn.active { background: #111; color: #fff; border-color: #111; }
.auto-btn { display: none; }
.auto-row-ui { display: flex; align-items: center; gap: 8px; margin-bottom: 0.6rem; flex-shrink: 0; }
.auto-toggle-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 0; }
.auto-track { width: 36px; height: 20px; border-radius: 99px; background: #e0e0e0; position: relative; transition: background 0.2s; flex-shrink: 0; display: block; }
.auto-track.on { background: #111; }
.auto-knob { width: 16px; height: 16px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
.auto-track.on .auto-knob { left: 18px; }
.auto-toggle-label { font-size: 13px; font-weight: 500; color: var(--color-text-primary, #111); }
.auto-sec-btn { font-size: 13px; font-weight: 500; padding: 0; border: none; border-bottom: 1.5px solid #bbb; background: transparent; color: #bbb; cursor: default; transition: all 0.15s; border-radius: 0; }
.auto-sec-btn:not(.disabled) { color: #111; border-bottom-color: #111; cursor: pointer; }
.ad-wrap { flex: 1; min-height: 0; overflow: hidden; }
.auto-sec-badge { font-size: 11px; font-weight: 500; opacity: 0.7; }

.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-size: 15px; text-align: center; }
.empty-state .sub { font-size: 13px; color: #bbb; margin-top: 6px; }

.celebration { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; z-index: 10; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.celebration .emoji-burst { font-size: 56px; margin-bottom: 1.25rem; animation: pop 0.5s cubic-bezier(.4,2,.6,1) both; }
@keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1); } }
.celebration .cele-title { font-size: 22px; font-weight: 500; color: #111; margin-bottom: 8px; }
.celebration .cele-sub { font-size: 14px; color: #999; line-height: 1.6; }
.celebration .cele-btn { margin-top: 2rem; padding: 14px 36px; border-radius: 14px; background: #111; color: #fff; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

/* MANAGE */
.manage-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-shrink: 0; }
.manage-title { font-size: 16px; font-weight: 500; color: #111; }
.mgr-menu-btn { width: 32px; height: 32px; border-radius: 8px; border: 0.5px solid #e0e0e0; background: #fff; color: #555; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; position: relative; }
.mgr-menu-btn:hover { background: #f5f5f5; }
.mgr-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); min-width: 130px; z-index: 100; overflow: hidden; padding: 6px 0; }
.mgr-dropdown.hidden { display: none; }
.mgr-dropdown-item { display: block; width: 100%; padding: 8px 16px; font-size: 13px; font-weight: 500; color: #333; background: none; border: none; cursor: pointer; text-align: left; transition: background 0.1s; }
.mgr-dropdown-item:hover { background: #f5f5f5; }
.manage-list-wrap { flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 1rem; scrollbar-width: thin; }
.manage-list-wrap::-webkit-scrollbar { width: 3px; }
.manage-list-wrap::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }
.card-list { display: flex; flex-direction: column; gap: 8px; }
.card-item { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 14px; padding: 11px 12px; display: flex; align-items: flex-start; gap: 8px; transition: opacity 0.15s; }
.card-item.done { opacity: 0.4; }
.card-item.dragging { opacity: 0.2; }
.card-item.drag-over { border-color: #999; background: #fafafa; }
.drag-handle { color: #ccc; cursor: grab; font-size: 15px; flex-shrink: 0; margin-top: 2px; line-height: 1; touch-action: none; }
.drag-handle:active { cursor: grabbing; }
.check-box { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid #ddd; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all 0.15s; }
.check-box.checked { background: #111; border-color: #111; }
.card-texts { flex: 1; min-width: 0; }
.card-a { font-size: 13px; font-weight: 500; color: #111; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.card-b { font-size: 12px; color: #888; line-height: 1.5; margin-top: 2px; white-space: pre-wrap; word-break: break-word; }
.item-actions { display: flex; gap: 0; flex-shrink: 0; align-items: flex-start; }
.icon-btn { width: 22px; height: 22px; border: none; background: none; cursor: pointer; color: #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 13px; padding: 0; }
.icon-btn:hover { background: #f5f5f5; color: #111; }
.icon-btn.danger:hover { color: #e24b4a; }
@media (hover: none) and (pointer: coarse) {
  .icon-btn { width: 24px; height: 24px; font-size: 16px; }
}

/* MODAL - bottom sheet, 화면의 3/4 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
.modal {
  background: #fff; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 480px;
  height: 75vh;
  display: flex; flex-direction: column;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}
.modal.swipe-closing { transform: translateY(100%); }
.modal-handle-wrap { padding: 12px 0 4px; flex-shrink: 0; cursor: grab; }
.modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 99px; margin: 0 auto; }
.modal-inner { flex: 1; overflow-y: auto; padding: 0 1.25rem 1rem; scrollbar-width: none; }
.modal-inner::-webkit-scrollbar { display: none; }
.modal-title { font-size: 15px; font-weight: 500; color: #111; margin-bottom: 1rem; }
.modal label { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 5px; }
.modal textarea { width: 100%; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: none; background: #fafafa; color: #111; margin-bottom: 14px; outline: none; transition: border-color 0.15s; line-height: 1.6; }
.modal textarea:focus { border-color: #aaa; background: #fff; }
/* 팝업 태그: 줄바꿈 */
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; padding-bottom: 4px; }
.tag-toggle { display: inline-flex; align-items: center; font-size: 13px; padding: 6px 13px; border-radius: 99px; border: 0.5px solid #e0e0e0; background: #fafafa; color: #888; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.tag-toggle.on { background: #111; color: #fff; border-color: #111; }
.tag-add-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; border: 0.5px dashed #ccc; background: transparent; color: #ccc; cursor: pointer; font-size: 20px; font-weight: 300; transition: all 0.15s; line-height: 1; }
.tag-add-btn:hover { border-color: #888; color: #888; }
.new-tag-wrap { display: flex; gap: 6px; margin-bottom: 20px; }
.new-tag-wrap input { flex: 1; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 8px 11px; font-size: 13px; font-family: inherit; background: #fafafa; color: #111; outline: none; }
.new-tag-wrap input:focus { border-color: #aaa; }
.new-tag-wrap button { padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; background: #111; color: #fff; border: none; }
.modal-footer { flex-shrink: 0; display: flex; gap: 8px; padding: 8px 1.25rem calc(env(safe-area-inset-bottom, 0px) + 16px); border-top: 0.5px solid #f0f0f0; }
.modal-footer button { flex: 1; padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-cancel { background: #f5f5f5; border: none; color: #111; }
.btn-save { background: #111; color: #fff; border: none; }

/* IMPORT MODAL */
.import-modal { background: #fff; border-radius: 20px 20px 0 0; padding: 1.25rem 1.25rem 2.5rem; width: 100%; max-width: 480px; }
.import-option { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border: 0.5px solid #e0e0e0; border-radius: 12px; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; }
.import-option:hover { border-color: #aaa; background: #fafafa; }
.import-option.selected { border-color: #111; background: #fafafa; }
.import-option-radio { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #ddd; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.import-option.selected .import-option-radio { border-color: #111; background: #111; }
.import-option.selected .import-option-radio::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; display: block; }
.import-option-text .opt-title { font-size: 14px; font-weight: 500; color: #111; margin-bottom: 3px; }
.import-option-text .opt-desc { font-size: 12px; color: #999; line-height: 1.5; }
</style>
</head>
<body>
<div class="app" id="app">
  <div id="study-tab"></div>
  <div id="manage-tab" class="hidden"></div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tb-study" onclick="switchTab('study')">학습</button>
    <button class="tab-center" onclick="openAdd()">+</button>
    <button class="tab-btn" id="tb-manage" onclick="switchTab('manage')">관리</button>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay hidden" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-sheet">
    <div class="modal-handle-wrap" id="modal-handle-wrap">
      <div class="modal-handle"></div>
    </div>
    <div class="modal-inner" id="modal-inner">
      <p class="modal-title" id="modal-title">문장 추가</p>
      <label>앞면 (A)</label>
      <textarea id="f-a" rows="4" placeholder="앞면에 표시할 문장"></textarea>
      <label>뒷면 (B)</label>
      <textarea id="f-b" rows="4" placeholder="뒷면에 표시할 문장"></textarea>
      <label>태그</label>
      <div class="tag-row" id="tag-row"></div>
      <div class="new-tag-wrap hidden" id="new-tag-wrap">
        <input type="text" id="tag-input" placeholder="새 태그 이름" onkeydown="if(event.key==='Enter')confirmNewTag()" oninput="limitTagBytes(this)">
        <button onclick="confirmNewTag()">확인</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay hidden" id="import-modal" onclick="if(event.target===this)closeImportModal()">
  <div class="import-modal">
    <div class="modal-handle" style="margin:0 auto 1.25rem;"></div>
    <p class="modal-title" style="margin-bottom:6px;">불러오기 방식</p>
    <p style="font-size:13px;color:#999;margin-bottom:1rem;" id="import-file-info"></p>
    <div class="import-option selected" id="opt-merge" onclick="selectImportMode('merge')">
      <div class="import-option-radio"></div>
      <div class="import-option-text">
        <div class="opt-title">병합</div>
        <div class="opt-desc">기존 문장은 유지하고 파일의 문장을 추가해요.<br>중복 문장(앞면+뒷면이 같은 경우)은 건너뜁니다.</div>
      </div>
    </div>
    <div class="import-option" id="opt-replace" onclick="selectImportMode('replace')">
      <div class="import-option-radio"></div>
      <div class="import-option-text">
        <div class="opt-title">덮어쓰기</div>
        <div class="opt-desc">기존 문장을 모두 삭제하고 파일의 문장으로 교체해요.</div>
      </div>
    </div>
    <div class="modal-footer" style="margin-top:1.25rem;border:none;padding:0;">
      <button class="btn-cancel" onclick="closeImportModal()">취소</button>
      <button class="btn-save" onclick="confirmImport()">불러오기</button>
    </div>
  </div>
</div>

<script>
// ── STORAGE ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'flashcard_data_v1';
function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { cards: [], nextId: 1 };
}
function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({cards, nextId})); } catch(e) {} }

let {cards, nextId} = loadData();
let currentTab = 'study';
let studyFilter = '전체';
let manageFilter = '전체';
let studyDeck = [];
let deckCardIdx = 0;
let isBack = false;
let editingId = null;
let modalTags = [];
let tempTags = [];
let showNewTagInput = false;
let dragSrcIdx = null;
let touchStartX = 0;

// ── HELPERS ────────────────────────────────────────────────────────────────
function allTags() { const s=new Set(); cards.forEach(c=>c.tags.forEach(t=>s.add(t))); return Array.from(s); }
function filteredCards(f) { return f==='전체'?[...cards]:cards.filter(c=>c.tags.includes(f)); }
function getActive(f) { return filteredCards(f).filter(c=>!c.done); }
function esc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ── CONFETTI ───────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#111','#555','#888','#aaa','#ccc','#333'];
  const pieces = Array.from({length: 90}, () => ({
    x: Math.random() * canvas.width, y: -10 - Math.random() * 100,
    w: 6 + Math.random() * 6, h: 10 + Math.random() * 8,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 4,
    rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 0.2, opacity: 1
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      if (frame > 60) p.opacity -= 0.018;
      ctx.save(); ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 130) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

let slideDir = ''; // 'left' | 'right' | ''
let isShuffled = false;
let autoPlay = false;
let autoSec = 5; // 5 → 10 → 3 순환
let autoTimer = null;
let autoRemaining = 0;
let autoRafId = null;
function initDeck() {
  const active = getActive(studyFilter);
  studyDeck = isShuffled
    ? [...active].sort(() => Math.random() - 0.5).map(c => c.id)
    : active.map(c => c.id);
  deckCardIdx = 0; isBack = false;
}

// ── TAB SWITCH ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  stopAutoTimer();
  document.getElementById('study-tab').classList.toggle('hidden', tab !== 'study');
  document.getElementById('manage-tab').classList.toggle('hidden', tab !== 'manage');
  document.getElementById('tb-study').classList.toggle('active', tab === 'study');
  document.getElementById('tb-manage').classList.toggle('active', tab === 'manage');
  if (tab === 'study') { if (studyDeck.length === 0) initDeck(); renderStudy(); if (autoPlay) startAutoTimer(); }
  else renderManage();
}

// ── STUDY ──────────────────────────────────────────────────────────────────
const ONBOARDING = [
  { a: 'Flipp에 오신 걸 환영해요 👋', b: '외우고 싶은 문장을 앞면/뒷면 세트로 등록하고,\n카드를 넘기며 학습해요.' },
  { a: '문장 추가하기\nHow to add a card', b: '하단 + 버튼을 눌러 앞면(A)과 뒷면(B)을 입력하세요.\nTap + at the bottom to add a new card.' },
  { a: '카드 넘기는 방법\nHow to navigate', b: '오른쪽 탭 / 왼쪽 스와이프 → 다음\n왼쪽 탭 / 오른쪽 스와이프 → 이전' },
  { a: '다 외웠다면?\nWhen you\'ve memorized it', b: '\'완벽히 외웠음\'을 누르면 해당 카드가 덱에서 빠져요.\n랜덤 모드와 자동 전환으로 복습 효율을 높여보세요.' }
];
let obIdx = 0, obBack = false;

function renderStudy() {
  const el = document.getElementById('study-tab');
  const tags = allTags();
  const tagBar = `<div class="tag-scroll">${['전체',...tags].map(t=>`<div class="tag-pill ${studyFilter===t?'active':''}" onclick="setStudyFilter('${esc(t)}')">${esc(t)}</div>`).join('')}</div>`;
  const filtered = filteredCards(studyFilter);

  // 등록된 문장 없음 → 온보딩 카드
  if (cards.length === 0) {
    const oc = ONBOARDING[obIdx];
    const op = ((obIdx + 1) / ONBOARDING.length) * 100;
    el.innerHTML = tagBar + `
      <div class="progress-row">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${op}%"></div></div>
        <span class="progress-count">${obIdx + 1} / ${ONBOARDING.length}</span>
      </div>
      <div class="card-area" id="card-area">
        <div class="flashcard ${obBack?'back':''}">
          <span class="card-side-label">${obBack?'뒷면':'앞면'}</span>
          <div class="card-content">${escHtml(obBack ? oc.b : oc.a)}</div>
        </div>
      </div>
      <div class="action-row">
        <button class="memorize-btn" onclick="openAdd()">+ 첫 문장 추가하기</button>
      </div>
      <div class="auto-row-ui"></div>
    `;
    const area = document.getElementById('card-area');
    if (!area) return;
    let tx = 0;
    area.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
    area.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 40) { dx < 0 ? obNext() : obPrev(); }
    }, {passive:true});
    area.addEventListener('click', e => {
      const rect = area.getBoundingClientRect();
      e.clientX - rect.left >= rect.width / 2 ? obNext() : obPrev();
    });
    return;
  }

  if (filtered.length === 0) {
    el.innerHTML = tagBar + `<div class="empty-state"><p>문장이 없습니다</p><p class="sub">+ 버튼으로 추가해보세요</p></div>`;
    return;
  }
  if (studyDeck.length === 0) initDeck();
  if (studyDeck.length === 0) { showCelebration(el, tagBar, filtered.length); return; }
  if (deckCardIdx >= studyDeck.length) deckCardIdx = 0;
  const cardId = studyDeck[deckCardIdx];
  const card = cards.find(c => c.id === cardId);
  if (!card) { studyDeck = studyDeck.filter(id => cards.find(c=>c.id===id)); if(!studyDeck.length){initDeck();} deckCardIdx=0; renderStudy(); return; }
  const progress = studyDeck.length > 0 ? ((deckCardIdx + 1) / studyDeck.length) * 100 : 100;

  el.innerHTML = tagBar + `
    <div class="progress-row">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
      <span class="progress-count">${deckCardIdx + 1} / ${studyDeck.length}</span>
    </div>
    <div class="card-area" id="card-area">
      <div class="flashcard ${isBack?'back':''} ${slideDir==='left'?'slide-in-left':slideDir==='right'?'slide-in-right':''}">
        ${card.tags.length ? `<span class="card-tag-label">${escHtml(card.tags.join(', '))}</span>` : ''}
        <span class="card-side-label">${isBack ? '뒷면' : '앞면'}</span>
        <div class="card-content">${escHtml(isBack ? card.b : card.a)}</div>
        ${autoPlay ? `<div id="countdown-wrap" style="position:absolute;bottom:10px;right:12px;display:flex;align-items:center;gap:4px;">
          <svg id="countdown-ring" width="24" height="24" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="none" stroke="${isBack?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.1)'}" stroke-width="2"/>
            <circle id="countdown-arc" cx="12" cy="12" r="10" fill="none" stroke="${isBack?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.5)'}" stroke-width="2" stroke-dasharray="62.83" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 12 12)"/>
          </svg>
          <span id="countdown-num" style="font-size:11px;color:${isBack?'rgba(255,255,255,0.55)':'rgba(0,0,0,0.4)'};">${autoSec}s</span>
        </div>` : ''}
      </div>
    </div>
    <div class="action-row">
      <button class="memorize-btn ${card.done?'active':''}" onclick="markMemorized(${card.id})">
        ${card.done ? '✓ 완벽히 외웠음' : '완벽히 외웠음'}
      </button>
      <button class="shuffle-btn ${isShuffled?'active':''}" onclick="toggleShuffle()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:5px;"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>랜덤
      </button>
    </div>
    <div class="auto-row-ui">
      <button class="auto-toggle-btn" onclick="toggleAutoPlay()">
        <span class="auto-track ${autoPlay?'on':''}" ><span class="auto-knob"></span></span>
        <span class="auto-toggle-label">자동 전환</span>
      </button>
      ${autoPlay ? `<button class="auto-sec-btn" onclick="cycleAutoSec()">${autoSec}s</button>` : ''}
    </div>
  `;
  setupCardInteraction();
}

function obNext() {
  if (!obBack) { obBack = true; }
  else { obBack = false; obIdx = (obIdx + 1) % ONBOARDING.length; }
  renderStudy();
}
function obPrev() {
  if (obBack) { obBack = false; }
  else if (obIdx > 0) { obIdx--; obBack = true; }
  renderStudy();
}

function showCelebration(el, tagBar, total) {
  el.innerHTML = tagBar + `
    <div class="celebration">
      <div class="emoji-burst">🎉</div>
      <div class="cele-title">모두 완료했어요!</div>
      <div class="cele-sub">${total}장을 모두 넘겼어요!<br>다시 섞어서 복습해볼까요?</div>
      <button class="cele-btn" onclick="restartDeck()">다시 섞기</button>
    </div>
  `;
  launchConfetti();
}

function restartDeck() {
  isShuffled = true; // 다시 섞기는 항상 랜덤으로
  initDeck(); renderStudy();
  if (autoPlay) startAutoTimer();
}

// ── AUTO PLAY ──────────────────────────────────────────────────────────────
// ── AUTO PLAY ──────────────────────────────────────────────────────────────
function toggleAutoPlay() {
  autoPlay = !autoPlay;
  if (autoPlay) { startAutoTimer(); }
  else { stopAutoTimer(); }
  renderStudy();
  if (autoPlay) startAutoTimer();
}

function cycleAutoSec() {
  if (autoSec === 5) autoSec = 10;
  else if (autoSec === 10) autoSec = 3;
  else autoSec = 5;
  stopAutoTimer();
  renderStudy();
  startAutoTimer();
}

function startAutoTimer() {
  stopAutoTimer();
  autoRemaining = autoSec * 1000;
  const start = performance.now();
  const total = autoRemaining;
  const circumference = 62.83;

  function tick(now) {
    const elapsed = now - start;
    const remaining = Math.max(0, total - elapsed);
    const secs = Math.ceil(remaining / 1000);
    const frac = remaining / total;
    const offset = circumference * (1 - frac);

    const arc = document.getElementById('countdown-arc');
    const num = document.getElementById('countdown-num');
    if (arc) arc.setAttribute('stroke-dashoffset', offset.toFixed(2));
    if (num) num.textContent = secs + 's';

    if (remaining <= 0) { autoAdvance(); return; }
    autoRafId = requestAnimationFrame(tick);
  }
  autoRafId = requestAnimationFrame(tick);
}

function stopAutoTimer() {
  if (autoRafId) { cancelAnimationFrame(autoRafId); autoRafId = null; }
}

function autoAdvance() {
  goNext();
  if (autoPlay) startAutoTimer();
}

function markMemorized(id) {
  stopAutoTimer();
  const wasDone = cards.find(c=>c.id===id)?.done;
  cards = cards.map(c => c.id===id ? {...c, done:!wasDone} : c);
  saveData();
  if (!wasDone) {
    isBack = false;
    const next = deckCardIdx + 1;
    if (next >= studyDeck.length) {
      const remaining = getActive(studyFilter);
      if (remaining.length === 0) { studyDeck = []; deckCardIdx = 0; renderStudy(); return; }
      deckCardIdx = 0;
    } else { deckCardIdx = next; }
  }
  renderStudy();
  if (autoPlay) startAutoTimer();
}

function setupCardInteraction() {
  const area = document.getElementById('card-area');
  if (!area) return;
  area.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
  area.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) { dx < 0 ? goNext() : goPrev(); }
  }, {passive:true});
  area.addEventListener('click', e => {
    const rect = area.getBoundingClientRect();
    e.clientX - rect.left >= rect.width / 2 ? goNext() : goPrev();
  });
}

function goNext() {
  stopAutoTimer();
  if (!isBack) {
    slideDir = '';
    isBack = true;
    renderStudy();
    if (autoPlay) startAutoTimer();
  } else {
    if (deckCardIdx === studyDeck.length - 1) {
      slideDir = '';
      isBack = false; deckCardIdx = 0;
      const el = document.getElementById('study-tab');
      const tags = allTags();
      const tagBar = `<div class="tag-scroll">${['전체',...tags].map(t=>`<div class="tag-pill ${studyFilter===t?'active':''}" onclick="setStudyFilter('${esc(t)}')">${esc(t)}</div>`).join('')}</div>`;
      showCelebration(el, tagBar, studyDeck.length);
    } else {
      slideCard('left', () => {
        slideDir = 'left';
        isBack = false; deckCardIdx++;
        renderStudy();
        slideDir = '';
        if (autoPlay) startAutoTimer();
      });
    }
  }
}
function goPrev() {
  stopAutoTimer();
  if (isBack) {
    slideDir = '';
    isBack = false;
    renderStudy();
    if (autoPlay) startAutoTimer();
  } else if (deckCardIdx > 0) {
    slideCard('right', () => {
      slideDir = 'right';
      deckCardIdx--; isBack = false;
      renderStudy();
      slideDir = '';
      if (autoPlay) startAutoTimer();
    });
  }
}

function slideCard(dir, callback) {
  const area = document.getElementById('card-area');
  if (!area) { callback(); return; }
  const card = area.querySelector('.flashcard');
  if (!card) { callback(); return; }
  const out = dir === 'left' ? '-110%' : '110%';
  card.style.transition = 'transform 0.2s cubic-bezier(.4,0,.2,1), opacity 0.2s';
  card.style.transform = `translateX(${out})`;
  card.style.opacity = '0';
  setTimeout(callback, 200);
}
function toggleShuffle() {
  isShuffled = !isShuffled;
  initDeck();
  renderStudy();
}
function setStudyFilter(t) {
  studyFilter = t; initDeck(); renderStudy();
  // 선택된 태그 pill이 보이도록 스크롤
  requestAnimationFrame(() => {
    const active = document.querySelector('#study-tab .tag-pill.active');
    if (active) active.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
  });
}

    <div class="manage-list-wrap">
      <div class="card-list" id="card-list">
        ${list.length === 0
          ? `<div style="text-align:center;padding:3rem 1rem;color:#999;font-size:14px;">문장이 없습니다</div>`
          : list.map((c,i)=>`
          <div class="card-item ${c.done?'done':''}" draggable="true" ondragstart="dStart(event,${i})" ondragover="dOver(event,${i})" ondrop="dDrop(event,${i})" ondragend="dEnd()" data-id="${c.id}" data-idx="${i}">
            <span class="drag-handle" data-handle="true">⠿</span>
            <div class="check-box ${c.done?'checked':''}" onclick="toggleDone(${c.id})">
              ${c.done?`<svg viewBox="0 0 10 10" width="10" height="10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="2.5" fill="none"/></svg>`:''}
            </div>
            <div class="card-texts">
              <div class="card-a">${escHtml(c.a)}</div>
              <div class="card-b">${escHtml(c.b)}</div>
            </div>
            <div class="item-actions">
              <button class="icon-btn" onclick="openEdit(${c.id})">✎</button>
              <button class="icon-btn danger" onclick="deleteCard(${c.id})">✕</button>
            </div>
          </div>`).join('')}
      </div>
    </div>
  `;
  setupTouchSort();
}

function setManageFilter(t) {
  manageFilter = t; renderManage();
  requestAnimationFrame(() => {
    const active = document.querySelector('#manage-tab .tag-pill.active');
    if (active) active.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
  });
}
function toggleDone(id) { cards = cards.map(c => c.id===id ? {...c, done:!c.done} : c); saveData(); renderManage(); }
function deleteCard(id) {
  if (!confirm('삭제할까요?')) return;
  cards = cards.filter(c => c.id!==id);
  studyDeck = studyDeck.filter(sid => sid !== id);
  if (studyDeck.length > 0 && deckCardIdx >= studyDeck.length) deckCardIdx = 0;
  // 현재 필터 태그에 해당하는 문장이 없어지면 '전체'로
  if (manageFilter !== '전체' && filteredCards(manageFilter).length === 0) {
    manageFilter = '전체';
  }
  saveData(); renderManage();
}

function toggleMgrMenu(e) {
  e.stopPropagation();
  document.getElementById('mgr-dropdown').classList.toggle('hidden');
}
function closeMgrMenu() {
  const d = document.getElementById('mgr-dropdown');
  if (d) d.classList.add('hidden');
}
document.addEventListener('click', () => closeMgrMenu());

// ── DRAG SORT (데스크탑) ────────────────────────────────────────────────────
function dStart(e,idx) {
  if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) { e.preventDefault(); return; }
  dragSrcIdx=idx; setTimeout(()=>{ const els=document.querySelectorAll('.card-item'); if(els[idx]) els[idx].classList.add('dragging'); },0); e.dataTransfer.effectAllowed='move';
}
function dOver(e,idx) { e.preventDefault(); document.querySelectorAll('.card-item').forEach((el,i)=>el.classList.toggle('drag-over',i===idx&&i!==dragSrcIdx)); }
function dDrop(e,idx) {
  e.preventDefault();
  if (dragSrcIdx===null||dragSrcIdx===idx) return;
  const list=filteredCards(manageFilter);
  const srcId=list[dragSrcIdx].id, dstId=list[idx].id;
  const si=cards.findIndex(c=>c.id===srcId);
  const [moved]=cards.splice(si,1);
  const di=cards.findIndex(c=>c.id===dstId);
  cards.splice(idx<dragSrcIdx?di:di+1,0,moved);
  dragSrcIdx=null; saveData(); renderManage();
}
function dEnd() { dragSrcIdx=null; document.querySelectorAll('.card-item').forEach(el=>el.classList.remove('dragging','drag-over')); }

// ── TOUCH SORT (모바일) ─────────────────────────────────────────────────────
let touchSort = { active:false, el:null, ghost:null, srcIdx:null, offsetY:0 };

function setupTouchSort() {
  const list = document.getElementById('card-list');
  if (!list) return;
  list.addEventListener('touchstart', onTouchSortStart, {passive:false});
  list.addEventListener('touchmove', onTouchSortMove, {passive:false});
  list.addEventListener('touchend', onTouchSortEnd, {passive:true});
}

function onTouchSortStart(e) {
  const handle = e.target.closest('[data-handle]');
  if (!handle) return;
  e.preventDefault();
  const item = handle.closest('.card-item');
  if (!item) return;
  const items = Array.from(document.querySelectorAll('.card-item'));
  touchSort.srcIdx = items.indexOf(item);
  touchSort.el = item;
  const rect = item.getBoundingClientRect();
  touchSort.offsetY = e.touches[0].clientY - rect.top;
  const ghost = item.cloneNode(true);
  ghost.style.cssText = `position:fixed;left:${rect.left}px;width:${rect.width}px;top:${rect.top}px;opacity:0.9;pointer-events:none;z-index:500;border-radius:14px;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.15);`;
  document.body.appendChild(ghost);
  touchSort.ghost = ghost;
  item.style.opacity = '0.25';
  touchSort.active = true;
}

function onTouchSortMove(e) {
  if (!touchSort.active) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  touchSort.ghost.style.top = (y - touchSort.offsetY) + 'px';
  const items = Array.from(document.querySelectorAll('.card-item'));
  items.forEach(el => el.classList.remove('drag-over'));
  const target = items.find(el => {
    if (el === touchSort.el) return false;
    const r = el.getBoundingClientRect();
    return y >= r.top && y <= r.bottom;
  });
  if (target) target.classList.add('drag-over');
}

function onTouchSortEnd(e) {
  if (!touchSort.active) return;
  touchSort.active = false;
  document.body.removeChild(touchSort.ghost);
  touchSort.ghost = null;
  touchSort.el.style.opacity = '';
  const items = Array.from(document.querySelectorAll('.card-item'));
  const targetEl = items.find(el => el.classList.contains('drag-over'));
  items.forEach(el => el.classList.remove('drag-over'));
  if (targetEl && targetEl !== touchSort.el) {
    const targetIdx = items.indexOf(targetEl);
    const list = filteredCards(manageFilter);
    const srcId = list[touchSort.srcIdx].id;
    const dstId = list[targetIdx].id;
    const si = cards.findIndex(c => c.id === srcId);
    const [moved] = cards.splice(si, 1);
    const di = cards.findIndex(c => c.id === dstId);
    cards.splice(targetIdx < touchSort.srcIdx ? di : di + 1, 0, moved);
    saveData(); renderManage();
  }
  touchSort.el = null; touchSort.srcIdx = null;
}

// ── MODAL (bottom sheet + swipe to close) ─────────────────────────────────
function openAdd() {
  editingId=null;
  document.getElementById('modal-title').textContent='문장 추가';
  document.getElementById('f-a').value=''; document.getElementById('f-b').value='';
  modalTags=[]; tempTags=[]; showNewTagInput=false; renderModalTags();
  document.getElementById('modal').classList.remove('hidden');
  setupModalSwipe();
  // 모바일 키보드: 유저 제스처 체인 안에서 동기 호출
  document.getElementById('f-a').focus();
}
function openEdit(id) {
  editingId=id;
  const c=cards.find(c=>c.id===id);
  document.getElementById('modal-title').textContent='문장 수정';
  document.getElementById('f-a').value=c.a; document.getElementById('f-b').value=c.b;
  modalTags=[...c.tags]; tempTags=[]; showNewTagInput=false; renderModalTags();
  document.getElementById('modal').classList.remove('hidden');
  setupModalSwipe();
}

function closeModal() {
  const sheet = document.getElementById('modal-sheet');
  sheet.classList.add('swipe-closing');
  setTimeout(() => {
    document.getElementById('modal').classList.add('hidden');
    sheet.classList.remove('swipe-closing');
    sheet.style.transform = '';
    tempTags = [];
  }, 280);
}

function setupModalSwipe() {
  const handle = document.getElementById('modal-handle-wrap');
  const sheet = document.getElementById('modal-sheet');
  let startY = 0, dragging = false;

  handle.ontouchstart = e => { startY = e.touches[0].clientY; dragging = true; };
  handle.ontouchmove = e => {
    if (!dragging) return;
    const dy = Math.max(0, e.touches[0].clientY - startY);
    sheet.style.transform = `translateY(${dy}px)`;
  };
  handle.ontouchend = e => {
    if (!dragging) return; dragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 80) closeModal();
    else { sheet.style.transition='transform 0.2s'; sheet.style.transform=''; setTimeout(()=>sheet.style.transition='',200); }
  };
}

function renderModalTags() {
  const savedTags = allTags();
  const allVisible = Array.from(new Set([...savedTags, ...tempTags]));
  document.getElementById('tag-row').innerHTML =
    allVisible.map(t=>`<div class="tag-toggle ${modalTags.includes(t)?'on':''}" onclick="toggleModalTag('${esc(t)}')">${esc(t)}</div>`).join('') +
    `<button class="tag-add-btn" onclick="toggleNewTagInput()">+</button>`;
  document.getElementById('new-tag-wrap').classList.toggle('hidden', !showNewTagInput);
}
function toggleModalTag(t) { modalTags=modalTags.includes(t)?modalTags.filter(x=>x!==t):[...modalTags,t]; renderModalTags(); }
function limitTagBytes(input) {
  const encoder = new TextEncoder();
  while (encoder.encode(input.value).length > 40) {
    input.value = input.value.slice(0, -1);
  }
}
function toggleNewTagInput() {
  showNewTagInput = !showNewTagInput;
  document.getElementById('tag-input').value = '';
  renderModalTags();
  if (showNewTagInput) {
    document.getElementById('tag-input').focus();
  }
}
function confirmNewTag() {
  const val = document.getElementById('tag-input').value.trim();
  if (val) {
    if (!allTags().includes(val) && !tempTags.includes(val)) tempTags.push(val);
    if (!modalTags.includes(val)) modalTags.push(val);
  }
  showNewTagInput = false; document.getElementById('tag-input').value=''; renderModalTags();
}
function saveCard() {
  const a=document.getElementById('f-a').value.trim(), b=document.getElementById('f-b').value.trim();
  if (!a||!b) { alert('앞면과 뒷면을 모두 입력해주세요.'); return; }
  if (editingId) { cards=cards.map(c=>c.id===editingId?{...c,a,b,tags:modalTags}:c); }
  else { cards.push({id:nextId++,a,b,tags:modalTags,done:false,createdAt:Date.now()}); }
  tempTags=[];
  saveData(); closeModal();
  if (currentTab==='manage') setTimeout(renderManage, 300);
  else { initDeck(); setTimeout(renderStudy, 300); }
}

// ── EXPORT / IMPORT ────────────────────────────────────────────────────────
function exportCards(format = 'json') {
  const date = new Date().toISOString().slice(0, 10);
  let blob, filename;
  if (format === 'csv') {
    const csvEsc = s => '"' + String(s).replace(/"/g, '""').replace(/\n/g, '\\n') + '"';
    const rows = [['앞면(A)', '뒷면(B)', '태그', '외웠음'].map(csvEsc).join(',')];
    cards.forEach(c => {
      rows.push([c.a, c.b, c.tags.join('|'), c.done ? '1' : '0'].map(csvEsc).join(','));
    });
    blob = new Blob(['\uFEFF' + rows.join('\r\n')], {type: 'text/csv;charset=utf-8'});
    filename = `flipp_${date}.csv`;
  } else {
    const data = { version:1, exportedAt:new Date().toISOString(), cards:cards.map(c=>({a:c.a,b:c.b,tags:c.tags,done:c.done})) };
    blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    filename = `flipp_${date}.json`;
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click(); URL.revokeObjectURL(url);
}

let pendingImportData=null, importMode='merge';
function triggerImport() { const i=document.getElementById('import-input'); i.value=''; i.click(); }

function handleImportFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const text = ev.target.result;
      let parsed;
      if (file.name.endsWith('.csv')) {
        const { rows, skipped } = parseCsv(text);
        if (rows.length === 0) {
          if (skipped > 0) {
            alert(`불러오기 실패\n\n앞면(A)과 뒷면(B)은 필수 항목이에요.\n${skipped}개 행 모두 필수 항목이 비어있어요.\n\n양식을 다시 확인해주세요.`);
          } else {
            alert('올바른 파일이 아니에요.\nFlipp 양식에 맞는 CSV 파일을 선택해주세요.');
          }
          return;
        }
        if (skipped > 0) {
          // 일부 행만 유효한 경우 계속 진행 (경고는 confirmImport에서 표시)
        }
        parsed = rows;
        pendingImportData = { cards: parsed, skipped };
      } else {
        const data = JSON.parse(text);
        if (!data.cards || !Array.isArray(data.cards)) throw new Error();
        parsed = data.cards;
        pendingImportData = { cards: parsed, skipped: 0 };
      }
      if (!parsed.length) throw new Error('empty');
      importMode = 'merge';
      const info = pendingImportData.skipped > 0
        ? `${file.name} · ${parsed.length}개 문장 (${pendingImportData.skipped}개 행 건너뜀 — 필수 항목 누락)`
        : `${file.name} · ${parsed.length}개 문장`;
      document.getElementById('import-file-info').textContent = info;
      selectImportMode('merge');
      document.getElementById('import-modal').classList.remove('hidden');
    } catch(err) {
      alert('올바른 파일이 아니에요.\nJSON 또는 Flipp에서 내보낸 CSV 파일을 선택해주세요.');
    }
  };
  reader.readAsText(file);
}

function downloadTemplate() {
  const header = [
    '앞면_A_필수', '뒷면_B_필수', '태그_선택(여러개는|로구분)', '외웠음_선택(0또는1)'
  ].map(h => '"' + h + '"').join(',');
  const blob = new Blob(['\uFEFF' + header + '\r\n'], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'flipp_template.csv';
  a.click(); URL.revokeObjectURL(url);
}

function parseCsv(text) {
  const clean = text.replace(/^\uFEFF/, '');
  // 전체 텍스트를 문자 단위로 파싱 — 쌍따옴표 안의 실제 줄바꿈 처리
  const rows = [];
  let row = [], cur = '', inQ = false, i = 0;
  while (i < clean.length) {
    const ch = clean[i];
    if (ch === '"') {
      if (inQ && clean[i+1] === '"') { cur += '"'; i += 2; continue; }
      inQ = !inQ; i++; continue;
    }
    if (!inQ) {
      if (ch === ',') { row.push(cur); cur = ''; i++; continue; }
      if (ch === '\r' && clean[i+1] === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; i += 2; continue; }
      if (ch === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; i++; continue; }
    }
    cur += ch; i++;
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }

  if (rows.length < 2) return { rows: [], skipped: 0 };
  let skipped = 0;
  const parsed = rows.slice(1).map(cols => {
    const [a='', b='', tagsRaw='', doneRaw='0'] = cols;
    const tags = tagsRaw.trim() ? tagsRaw.split('|').map(t=>t.trim()).filter(Boolean) : [];
    return { a: a.trim(), b: b.trim(), tags, done: doneRaw.trim() === '1' };
  }).filter(c => {
    if (c.a && c.b) return true;
    skipped++;
    return false;
  });
  return { rows: parsed, skipped };
}
function selectImportMode(mode) {
  importMode=mode;
  document.getElementById('opt-merge').classList.toggle('selected', mode==='merge');
  document.getElementById('opt-replace').classList.toggle('selected', mode==='replace');
}
function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); pendingImportData=null; }
function confirmImport() {
  if(!pendingImportData) return;
  const incoming=pendingImportData.cards.map(c=>({id:nextId++,a:String(c.a||'').trim(),b:String(c.b||'').trim(),tags:Array.isArray(c.tags)?c.tags:[],done:!!c.done})).filter(c=>c.a&&c.b);
  if(importMode==='replace') { cards=incoming; }
  else {
    const existing=new Set(cards.map(c=>c.a+'\x00'+c.b));
    const fresh=incoming.filter(c=>!existing.has(c.a+'\x00'+c.b));
    cards=[...cards,...fresh];
    if(fresh.length<incoming.length) setTimeout(()=>alert(`${fresh.length}개 추가, ${incoming.length-fresh.length}개 중복 건너뜀`),100);
  }
  saveData(); closeImportModal(); initDeck(); renderManage();
  if(currentTab==='study') renderStudy();
}

// ── KEYBOARD ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(document.getElementById('modal').classList.contains('hidden') && currentTab==='study') {
    if(e.key==='ArrowRight') goNext();
    if(e.key==='ArrowLeft') goPrev();
  }
  if(e.key==='Escape') { closeModal(); closeImportModal(); }
});

initDeck();
renderStudy();
</script>
